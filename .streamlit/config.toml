[theme]
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = true

[server]
headless = true
port = 8080
enableCORS = false
# Prevent Streamlit from reloading the app on file save (stops frequent reconnects during dev)
runOnSave = false
fileWatcherType = "none"

[logger]
level = "debug"
